<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Foreman Brain" />
<meta name="application-name" content="Foreman Brain" />
<meta name="theme-color" content="#080b0e" />
<meta name="description" content="AI Electrical Estimating System — Master Electrician Mode" />
<title>Foreman Brain — AI Electrical Estimating</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #080b0e;
    --surface: #0e1318;
    --surface2: #131920;
    --border: #1e2830;
    --border2: #253040;
    --amber: #f0a500;
    --amber-dim: #a37010;
    --amber-glow: rgba(240,165,0,0.12);
    --red: #e05050;
    --green: #3db87a;
    --text: #c8d4dc;
    --text-dim: #6a7d8a;
    --text-muted: #3a4a55;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Barlow Condensed', sans-serif;
    --body: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:9999; }
  .header { background:var(--surface); border-bottom:2px solid var(--amber); padding:0 32px; height:64px; display:flex; align-items:center; gap:20px; position:sticky; top:0; z-index:100; box-shadow:0 4px 40px rgba(240,165,0,0.08); }
  .header-logo { width:40px; height:40px; background:var(--amber); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; animation:pulse-logo 3s ease-in-out infinite; }
  @keyframes pulse-logo { 0%,100%{box-shadow:0 0 0 0 rgba(240,165,0,0.4)} 50%{box-shadow:0 0 0 8px rgba(240,165,0,0)} }
  .header-title { font-family:var(--display); font-size:26px; font-weight:900; letter-spacing:4px; color:var(--amber); text-transform:uppercase; }
  .header-sub { font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:2px; }
  .header-status { margin-left:auto; display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; color:var(--text-dim); }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .main { max-width:1200px; margin:0 auto; padding:36px 24px 80px; }
  .input-panel { background:var(--surface); border:1px solid var(--border); border-radius:2px; overflow:hidden; margin-bottom:28px; position:relative; }
  .input-panel::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--amber),transparent); }
  .panel-header { background:var(--surface2); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:10px; }
  .panel-label { font-family:var(--mono); font-size:10px; color:var(--amber); letter-spacing:2px; text-transform:uppercase; }
  .panel-badge { font-family:var(--mono); font-size:9px; color:var(--text-muted); border:1px solid var(--border); padding:2px 8px; border-radius:2px; }
  .input-body { padding:20px; }
  .job-textarea { width:100%; min-height:130px; background:var(--bg); border:1px solid var(--border); border-radius:2px; color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.7; padding:16px; resize:vertical; outline:none; transition:border-color 0.2s; }
  .job-textarea:focus { border-color:var(--amber); }
  .job-textarea::placeholder { color:var(--text-muted); }
  .quick-fills { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; margin-bottom:16px; }
  .qf-btn { font-family:var(--mono); font-size:10px; color:var(--text-dim); background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:5px 12px; cursor:pointer; transition:all 0.15s; letter-spacing:1px; }
  .qf-btn:hover { border-color:var(--amber-dim); color:var(--amber); }
  .input-actions { display:flex; gap:12px; align-items:center; }
  .btn-estimate { font-family:var(--display); font-size:15px; font-weight:700; letter-spacing:3px; color:var(--bg); background:var(--amber); border:none; border-radius:2px; padding:12px 32px; cursor:pointer; text-transform:uppercase; transition:all 0.2s; position:relative; overflow:hidden; }
  .btn-estimate:hover:not(:disabled) { background:#ffbb20; box-shadow:0 0 30px rgba(240,165,0,0.3); }
  .btn-estimate:disabled { background:var(--border2); color:var(--text-muted); cursor:not-allowed; }
  .btn-estimate.loading::after { content:''; position:absolute; bottom:0; left:-100%; width:100%; height:2px; background:rgba(255,255,255,0.5); animation:slide-loading 1.2s linear infinite; }
  @keyframes slide-loading { to{left:100%} }
  .btn-clear { font-family:var(--mono); font-size:11px; color:var(--text-muted); background:transparent; border:1px solid var(--border); border-radius:2px; padding:11px 20px; cursor:pointer; letter-spacing:1px; transition:all 0.15s; }
  .btn-clear:hover { color:var(--red); border-color:var(--red); }
  .loading-panel { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:60px 32px; text-align:center; margin-bottom:28px; }
  .loading-hex { width:72px; height:72px; background:var(--amber-glow); border:2px solid var(--amber); clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 24px; animation:spin 2s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-title { font-family:var(--display); font-size:20px; font-weight:700; letter-spacing:3px; color:var(--amber); margin-bottom:10px; }
  .loading-steps { display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin-top:20px; }
  .loading-step { font-family:var(--mono); font-size:10px; color:var(--text-muted); letter-spacing:1px; animation:step-fade 2.4s ease-in-out infinite; }
  .loading-step:nth-child(2){animation-delay:0.4s} .loading-step:nth-child(3){animation-delay:0.8s} .loading-step:nth-child(4){animation-delay:1.2s} .loading-step:nth-child(5){animation-delay:1.6s} .loading-step:nth-child(6){animation-delay:2.0s}
  @keyframes step-fade { 0%,100%{color:var(--text-muted)} 50%{color:var(--amber)} }
  .error-box { background:rgba(224,80,80,0.08); border:1px solid var(--red); border-radius:2px; padding:14px 20px; font-family:var(--mono); font-size:12px; color:var(--red); margin-bottom:24px; }
  .cost-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1.4fr; gap:12px; margin-bottom:24px; }
  .cost-card { background:var(--surface); border:1px solid var(--border); border-radius:2px; padding:16px 18px; position:relative; overflow:hidden; animation:card-in 0.4s ease both; }
  .cost-card:nth-child(1){animation-delay:0.05s} .cost-card:nth-child(2){animation-delay:0.1s} .cost-card:nth-child(3){animation-delay:0.15s} .cost-card:nth-child(4){animation-delay:0.2s}
  @keyframes card-in { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .cost-card.total { background:linear-gradient(135deg,var(--amber-glow),rgba(240,165,0,0.04)); border-color:var(--amber); }
  .cost-card::after { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--border2); }
  .cost-card.total::after { background:var(--amber); }
  .cost-label { font-family:var(--mono); font-size:9px; color:var(--text-muted); letter-spacing:2px; margin-bottom:10px; text-transform:uppercase; }
  .cost-value { font-family:var(--display); font-size:26px; font-weight:700; color:var(--text); letter-spacing:1px; }
  .cost-card.total .cost-value { font-size:30px; color:var(--amber); }
  .cost-sub { font-family:var(--mono); font-size:9px; color:var(--text-muted); margin-top:6px; }
  .tabs-bar { display:flex; gap:2px; border-bottom:2px solid var(--border); }
  .tab-btn { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--text-muted); background:transparent; border:1px solid transparent; border-bottom:none; padding:10px 20px; cursor:pointer; text-transform:uppercase; transition:all 0.15s; border-radius:2px 2px 0 0; position:relative; top:2px; }
  .tab-btn:hover { color:var(--text-dim); }
  .tab-btn.active { color:var(--amber); background:var(--surface); border-color:var(--border); border-bottom:2px solid var(--surface); }
  .tab-content { background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 2px 2px; padding:28px; min-height:320px; animation:fade-in 0.2s ease; }
  @keyframes fade-in { from{opacity:0} to{opacity:1} }
  .section-label { font-family:var(--mono); font-size:10px; color:var(--amber); letter-spacing:2px; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .summary-card { background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:16px; }
  .summary-card-label { font-family:var(--mono); font-size:9px; color:var(--amber); letter-spacing:2px; margin-bottom:8px; text-transform:uppercase; }
  .summary-card-value { font-size:13px; color:var(--text); line-height:1.7; font-family:var(--body); font-weight:300; }
  .logic-box { background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:22px; font-family:var(--body); font-size:13px; font-weight:300; color:var(--text); line-height:1.9; white-space:pre-wrap; }
  .materials-table { width:100%; border-collapse:collapse; font-size:12px; }
  .materials-table thead tr { border-bottom:1px solid var(--amber); }
  .materials-table th { font-family:var(--mono); font-size:9px; color:var(--amber); letter-spacing:2px; padding:8px 12px; text-align:left; font-weight:normal; }
  .materials-table th.right { text-align:right; }
  .materials-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
  .materials-table tbody tr:hover { background:var(--surface2); }
  .materials-table td { padding:10px 12px; font-family:var(--body); font-weight:300; color:var(--text); }
  .materials-table td.dim { color:var(--text-dim); font-family:var(--mono); font-size:11px; }
  .materials-table td.right { text-align:right; }
  .materials-table tfoot tr { border-top:1px solid var(--amber); }
  .materials-table tfoot td { padding:12px 12px; font-family:var(--mono); font-size:10px; }
  .tfoot-raw { color:var(--amber); font-size:11px; letter-spacing:1px; text-transform:uppercase; }
  .tfoot-raw-val { text-align:right; color:var(--amber); font-size:16px; font-family:var(--display); font-weight:700; }
  .tfoot-markup { color:var(--text-dim); font-size:9px; }
  .tfoot-markup-val { text-align:right; color:var(--text); font-family:var(--mono); font-size:12px; }
  .labor-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .breakdown-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
  .breakdown-label { font-family:var(--body); font-size:13px; color:var(--text-dim); font-weight:300; }
  .breakdown-val { font-family:var(--mono); font-size:13px; color:var(--text); }
  .total-row { display:flex; justify-content:space-between; align-items:center; background:linear-gradient(135deg,var(--amber-glow),transparent); border:1px solid var(--amber); border-radius:2px; padding:16px 18px; margin-top:14px; }
  .total-row-label { font-family:var(--display); font-size:14px; font-weight:700; letter-spacing:2px; color:var(--amber); text-transform:uppercase; }
  .total-row-val { font-family:var(--display); font-size:28px; font-weight:700; color:var(--amber); }
  .hours-display { background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:24px; text-align:center; }
  .hours-big { font-family:var(--display); font-size:72px; font-weight:900; color:var(--amber); line-height:1; }
  .hours-unit { font-family:var(--mono); font-size:11px; color:var(--text-dim); letter-spacing:2px; margin-top:8px; }
  .hours-rate { font-family:var(--mono); font-size:10px; color:var(--text-muted); margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .proposal-box { background:var(--bg); border:1px solid var(--border); border-radius:2px; padding:32px; font-family:var(--body); font-size:14px; color:var(--text); line-height:2; font-weight:300; white-space:pre-wrap; min-height:200px; }
  .proposal-actions { display:flex; gap:10px; margin-top:16px; }
  .btn-action { font-family:var(--mono); font-size:10px; color:var(--text-dim); background:transparent; border:1px solid var(--border); border-radius:2px; padding:9px 18px; cursor:pointer; letter-spacing:1px; transition:all 0.15s; }
  .btn-action:hover { color:var(--amber); border-color:var(--amber); }
  .btn-action.copied { color:var(--green); border-color:var(--green); }
  .exclusions { margin-top:24px; padding:14px 18px; background:var(--surface2); border-left:3px solid var(--border2); font-family:var(--mono); font-size:10px; color:var(--text-muted); line-height:1.8; }
  .mobile-fab { display:none; position:fixed; bottom:24px; right:20px; z-index:200; }
  .fab-btn { width:64px; height:64px; border-radius:50%; background:var(--amber); border:none; font-size:26px; cursor:pointer; box-shadow:0 4px 28px rgba(240,165,0,0.55); display:flex; align-items:center; justify-content:center; transition:transform 0.15s; color:#080b0e; }
  .fab-btn:active { transform:scale(0.91); }
  button { -webkit-tap-highlight-color:transparent; user-select:none; }
  html { scroll-behavior:smooth; }
  @media (max-width:800px) { .cost-grid{grid-template-columns:1fr 1fr} .summary-grid{grid-template-columns:1fr} .labor-grid{grid-template-columns:1fr} .header-title{font-size:20px} .tab-btn{padding:10px 12px;font-size:9px} }
  @media (max-width:600px) { .tab-btn{padding:13px 10px;font-size:8px;letter-spacing:1px} .btn-estimate{padding:15px 24px;font-size:14px;width:100%} .btn-clear{padding:14px 16px;width:100%} .input-actions{flex-direction:column} .header{height:auto;padding-top:14px;padding-bottom:14px} .header-status{display:none} .cost-grid{grid-template-columns:1fr 1fr} .tab-content{padding:18px} .hours-big{font-size:56px} .mobile-fab{display:flex} }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">⚡</div>
  <div>
    <div class="header-title">Foreman Brain</div>
    <div class="header-sub">AI ELECTRICAL ESTIMATING SYSTEM</div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span>MASTER ELECTRICIAN MODE ACTIVE</span>
  </div>
</header>

<div class="main">
  <div class="input-panel">
    <div class="panel-header">
      <span class="panel-label">▸ JOB INPUT</span>
      <span class="panel-badge">FIELD NOTES / DESCRIPTION / SCOPE</span>
    </div>
    <div class="input-body">
      <textarea class="job-textarea" id="jobInput" placeholder="Describe the job. Be as specific or vague as needed.&#10;&#10;Examples: 50A EV charger in garage, 80ft from panel | replace 100A panel with 200A service | add dedicated circuit for welder"></textarea>
      <div class="quick-fills">
        <button class="qf-btn" onclick="fillExample('50A EV charger in attached garage, approximately 60 feet from main panel. Panel is in the basement.')">▸ EV Charger</button>
        <button class="qf-btn" onclick="fillExample('200A service upgrade to replace existing 100A panel. House is 1970s construction, currently have 20 circuits.')">▸ Panel Upgrade</button>
        <button class="qf-btn" onclick="fillExample('Add a dedicated 20A circuit for a new refrigerator in the garage. About 40 feet from the panel.')">▸ Dedicated Circuit</button>
        <button class="qf-btn" onclick="fillExample('Install a 60A subpanel in the detached garage. Garage is 80 feet from the main house panel.')">▸ Subpanel</button>
        <button class="qf-btn" onclick="fillExample('240V circuit for a new hot tub on the back deck. Need GFCI disconnect. About 50 feet from panel.')">▸ Hot Tub Circuit</button>
        <button class="qf-btn" onclick="fillExample('Add 4 recessed lights and a ceiling fan in the living room. Currently no overhead lighting, finished ceiling.')">▸ Lighting Install</button>
      </div>
      <div class="input-actions">
        <button class="btn-estimate" id="runBtn" onclick="runEstimate()">▸ RUN ESTIMATE</button>
        <button class="btn-clear" onclick="clearAll()">CLEAR</button>
        <span id="charCount" style="font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-left:8px;"></span>
      </div>
    </div>
  </div>

  <div class="error-box" id="errorBox" style="display:none;"></div>

  <div class="loading-panel" id="loadingPanel" style="display:none;">
    <div class="loading-hex">⚡</div>
    <div class="loading-title">FOREMAN BRAIN PROCESSING</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--text-dim);">Analyzing job scope and running code logic...</div>
    <div class="loading-steps">
      <span class="loading-step">▸ JOB INTAKE</span>
      <span class="loading-step">▸ CODE LOGIC</span>
      <span class="loading-step">▸ MATERIAL TAKEOFF</span>
      <span class="loading-step">▸ LABOR ESTIMATE</span>
      <span class="loading-step">▸ PRICING</span>
      <span class="loading-step">▸ PROPOSAL</span>
    </div>
  </div>

  <div id="results" style="display:none;">
    <div class="cost-grid" id="costGrid"></div>
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab('summary',this)">SUMMARY</button>
      <button class="tab-btn" onclick="switchTab('logic',this)">INSTALL LOGIC</button>
      <button class="tab-btn" onclick="switchTab('materials',this)">TAKEOFF</button>
      <button class="tab-btn" onclick="switchTab('labor',this)">LABOR & COST</button>
      <button class="tab-btn" onclick="switchTab('proposal',this)">PROPOSAL</button>
    </div>
    <div class="tab-content">
      <div id="tab-summary"></div>
      <div id="tab-logic" style="display:none;"></div>
      <div id="tab-materials" style="display:none;"></div>
      <div id="tab-labor" style="display:none;"></div>
      <div id="tab-proposal" style="display:none;"></div>
    </div>
  </div>
</div>

<div class="mobile-fab" id="mobileFab">
  <button class="fab-btn" onclick="runEstimate()">⚡</button>
</div>

<script>
var SYSTEM_PROMPT = "You are Foreman Brain, an AI electrical estimating system designed to think and operate like a licensed master electrician and experienced electrical contractor. Your purpose is to convert job descriptions into a realistic electrical estimate package. You must reason internally like a master electrician planning a job before producing the final estimate. CORE IDENTITY: Master electrician, 20+ years experience, residential and light commercial. WORKFLOW: Step 1 - Job Intake: Determine job type, scope, assumptions. Step 2 - Code Logic: Circuit size, conductor, breaker, NEC requirements. Step 3 - Material Takeoff: COMPLETE list, every part including small parts (connectors, staples, wirenuts, straps, bushings, plates, grounding hardware). Never skip small parts. Step 4 - Pricing: Raw Material Total x 1.35 = Marked-Up Cost. Step 5 - Labor: Hours x $100/hr. Adjust for difficulty. Step 6 - Proposal: Professional, customer-ready. CONDUCTOR SIZING: 15A=14AWG, 20A=12AWG, 30A=10AWG, 40A=8AWG, 50A=6AWG. ASSUMPTIONS (when unknown): Residential wood-frame, standard drywall, normal access, short run=25-50ft, medium=50-100ft, long=100-150ft. FORMULAS: rawMaterialCost = sum of all materialTakeoff totalCost values. markedUpMaterialCost = rawMaterialCost x 1.35. laborCost = laborHours x 100. totalEstimate = markedUpMaterialCost + laborCost. EXCLUSIONS: drywall patching, painting, trenching, permit fees, utility coordination. CRITICAL: Return ONLY raw JSON. No markdown. No backticks. No explanation. Just the JSON object: {\"projectSummary\":{\"jobType\":\"string\",\"customerRequest\":\"string\",\"observedConditions\":\"string\",\"assumedConditions\":\"string\"},\"installationLogic\":\"string\",\"materialTakeoff\":[{\"item\":\"string\",\"qty\":\"string\",\"unitCost\":0,\"totalCost\":0}],\"laborHours\":0,\"rawMaterialCost\":0,\"markedUpMaterialCost\":0,\"laborCost\":0,\"totalEstimate\":0,\"customerProposal\":\"string\"}";

var currentEstimate = null;

function fillExample(text) {
  document.getElementById('jobInput').value = text;
  updateCharCount();
}

function updateCharCount() {
  var v = document.getElementById('jobInput').value;
  document.getElementById('charCount').textContent = v.length > 0 ? v.length + ' chars' : '';
}

document.getElementById('jobInput').addEventListener('input', updateCharCount);

function clearAll() {
  document.getElementById('jobInput').value = '';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loadingPanel').style.display = 'none';
  document.getElementById('charCount').textContent = '';
  currentEstimate = null;
}

function fmt(n) {
  if (typeof n !== 'number') return '$0.00';
  return n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}

async function runEstimate() {
  var input = document.getElementById('jobInput').value.trim();
  if (!input) return;
  var btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⚙ ESTIMATING...';
  btn.classList.add('loading');
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loadingPanel').style.display = 'block';
  try {
    var response = await fetch('https://foreman-brain.onrender.com/estimate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: input }]
      })
    });
    var data = await response.json();
    console.log('Server response:', JSON.stringify(data));
var raw = (data.content || []).map(function(b) { return b.text || ''; }).join('');
    var cleaned = raw.replace(/```json/g,'').replace(/```/g,'').trim();
    var parsed;
    try {
      parsed = JSON.parse(cleaned);
    } catch(e) {
      var match = cleaned.match(/\{[\s\S]*\}/);
      if (match) { parsed = JSON.parse(match[0]); }
      else { throw new Error('Could not parse estimate response.'); }
    }
    currentEstimate = parsed;
    renderEstimate(parsed);
  } catch(err) {
    document.getElementById('errorBox').textContent = '⚠ ' + (err.message || 'Failed to generate estimate. Please try again.');
    document.getElementById('errorBox').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '▸ RUN ESTIMATE';
    btn.classList.remove('loading');
    document.getElementById('loadingPanel').style.display = 'none';
  }
}

function renderEstimate(e) {
  var grid = document.getElementById('costGrid');
  grid.innerHTML =
    '<div class="cost-card"><div class="cost-label">Raw Material Cost</div><div class="cost-value">' + fmt(e.rawMaterialCost) + '</div><div class="cost-sub">Before markup</div></div>' +
    '<div class="cost-card"><div class="cost-label">Material w/ Markup</div><div class="cost-value">' + fmt(e.markedUpMaterialCost) + '</div><div class="cost-sub">Raw x 1.35</div></div>' +
    '<div class="cost-card"><div class="cost-label">Labor Cost</div><div class="cost-value">' + fmt(e.laborCost) + '</div><div class="cost-sub">' + e.laborHours + ' hrs @ $100/hr</div></div>' +
    '<div class="cost-card total"><div class="cost-label">Total Estimate</div><div class="cost-value">' + fmt(e.totalEstimate) + '</div><div class="cost-sub">Materials + Labor</div></div>';

  var ps = e.projectSummary || {};
  document.getElementById('tab-summary').innerHTML =
    '<div class="section-label">▸ PROJECT SUMMARY</div>' +
    '<div class="summary-grid">' +
    '<div class="summary-card"><div class="summary-card-label">Job Type</div><div class="summary-card-value">' + (ps.jobType||'—') + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">Customer Request</div><div class="summary-card-value">' + (ps.customerRequest||'—') + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">Observed Conditions</div><div class="summary-card-value">' + (ps.observedConditions||'—') + '</div></div>' +
    '<div class="summary-card"><div class="summary-card-label">Assumed Conditions</div><div class="summary-card-value">' + (ps.assumedConditions||'—') + '</div></div>' +
    '</div>';

  document.getElementById('tab-logic').innerHTML =
    '<div class="section-label">▸ INSTALLATION LOGIC & NEC REASONING</div>' +
    '<div class="logic-box">' + (e.installationLogic||'—') + '</div>';

  var rows = (e.materialTakeoff||[]).map(function(r) {
    return '<tr><td>' + (r.item||'—') + '</td><td class="dim right">' + (r.qty||'—') + '</td><td class="dim right">' + fmt(r.unitCost) + '</td><td class="right">' + fmt(r.totalCost) + '</td></tr>';
  }).join('');

  document.getElementById('tab-materials').innerHTML =
    '<div class="section-label">▸ MATERIAL TAKEOFF — ' + (e.materialTakeoff||[]).length + ' LINE ITEMS</div>' +
    '<table class="materials-table"><thead><tr><th>Item / Description</th><th class="right">Qty</th><th class="right">Unit Cost</th><th class="right">Total</th></tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '<tfoot><tr><td colspan="3" class="tfoot-raw">Raw Material Total</td><td class="tfoot-raw-val">' + fmt(e.rawMaterialCost) + '</td></tr>' +
    '<tr><td colspan="3" class="tfoot-markup">Marked-Up (x1.35)</td><td class="tfoot-markup-val">' + fmt(e.markedUpMaterialCost) + '</td></tr></tfoot></table>';

  document.getElementById('tab-labor').innerHTML =
    '<div class="section-label">▸ LABOR & COST BREAKDOWN</div>' +
    '<div class="labor-grid">' +
    '<div>' +
    '<div class="breakdown-row"><span class="breakdown-label">Raw Material Cost</span><span class="breakdown-val">' + fmt(e.rawMaterialCost) + '</span></div>' +
    '<div class="breakdown-row"><span class="breakdown-label">Markup Factor</span><span class="breakdown-val">x 1.35</span></div>' +
    '<div class="breakdown-row"><span class="breakdown-label">Marked-Up Materials</span><span class="breakdown-val">' + fmt(e.markedUpMaterialCost) + '</span></div>' +
    '<div class="breakdown-row"><span class="breakdown-label">Labor Rate</span><span class="breakdown-val">$100.00 / hr</span></div>' +
    '<div class="breakdown-row"><span class="breakdown-label">Labor Cost</span><span class="breakdown-val">' + fmt(e.laborCost) + '</span></div>' +
    '<div class="total-row"><span class="total-row-label">Total Estimate</span><span class="total-row-val">' + fmt(e.totalEstimate) + '</span></div>' +
    '</div>' +
    '<div class="hours-display"><div style="font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:2px;margin-bottom:12px;">ESTIMATED LABOR</div><div class="hours-big">' + e.laborHours + '</div><div class="hours-unit">HOURS ON-SITE</div><div class="hours-rate">@ $100.00 / HOUR = ' + fmt(e.laborCost) + '</div></div>' +
    '</div>';

  document.getElementById('tab-proposal').innerHTML =
    '<div class="section-label">▸ CUSTOMER PROPOSAL</div>' +
    '<div class="proposal-box" id="proposalText">' + (e.customerProposal||'—') + '</div>' +
    '<div class="proposal-actions">' +
    '<button class="btn-action" id="copyBtn" onclick="copyProposal()">⎘ COPY PROPOSAL</button>' +
    '<button class="btn-action" onclick="printProposal()">⎙ PRINT</button>' +
    '</div>' +
    '<div class="exclusions">STANDARD EXCLUSIONS: Drywall patching or painting · Trenching or boring · Permit fees · Utility coordination · Unforeseen concealed conditions</div>';

  document.getElementById('results').style.display = 'block';
  switchTab('summary', document.querySelector('.tab-btn'));
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchTab(name, btn) {
  ['summary','logic','materials','labor','proposal'].forEach(function(t) {
    var el = document.getElementById('tab-' + t);
    if (el) el.style.display = 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  var pane = document.getElementById('tab-' + name);
  if (pane) pane.style.display = 'block';
  if (btn) btn.classList.add('active');
}

function copyProposal() {
  if (!currentEstimate) return;
  navigator.clipboard.writeText(currentEstimate.customerProposal || '').then(function() {
    var btn = document.getElementById('copyBtn');
    if (btn) { btn.textContent = '✓ COPIED'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent = '⎘ COPY PROPOSAL'; btn.classList.remove('copied'); }, 2000); }
  });
}

function printProposal() {
  if (!currentEstimate) return;
  var win = window.open('', '_blank');
  win.document.write('<html><head><title>Electrical Estimate</title><style>body{font-family:Georgia,serif;font-size:14px;line-height:1.8;padding:60px;color:#222;max-width:800px;margin:0 auto;}pre{white-space:pre-wrap;font-family:Georgia,serif;}table{width:100%;border-collapse:collapse;margin-top:20px;}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #ddd;font-size:12px;}</style></head><body>');
  win.document.write('<h2>Electrical Estimate</h2><p style="color:#888;font-size:12px;margin-bottom:40px;">Generated by Foreman Brain</p>');
  win.document.write('<pre>' + (currentEstimate.customerProposal||'') + '</pre>');
  win.document.write('<table style="margin-top:30px;"><tr><th>Materials (with markup)</th><td>' + fmt(currentEstimate.markedUpMaterialCost) + '</td></tr><tr><th>Labor (' + currentEstimate.laborHours + ' hrs)</th><td>' + fmt(currentEstimate.laborCost) + '</td></tr><tr><th>Total Estimate</th><td><strong>' + fmt(currentEstimate.totalEstimate) + '</strong></td></tr></table>');
  win.document.write('</body></html>');
  win.document.close();
  win.print();
}

document.getElementById('jobInput').addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') runEstimate();
});

document.getElementById('jobInput').addEventListener('focus', function() {
  var fab = document.getElementById('mobileFab');
  if (fab) { fab.style.opacity='0'; fab.style.pointerEvents='none'; }
});

document.getElementById('jobInput').addEventListener('blur', function() {
  var fab = document.getElementById('mobileFab');
  if (fab) { fab.style.opacity='1'; fab.style.pointerEvents='auto'; }
});
</script>
</body>
</html>
